<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — Nurselink</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F0E8; font-family: 'Noto Sans JP', sans-serif; color: #1A1A1A; line-height: 1.7; min-height: 100dvh; display: flex; flex-direction: column; }

.site-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(245,240,232,0.95); backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.site-title { font-size: 16px; font-weight: 700; color: #1A1A1A; text-decoration: none; }
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-links a { font-size: 13px; color: #555; text-decoration: none; font-weight: 500; }
.nav-links a:hover, .nav-links a.active { color: #1D9E75; }
.nav-btn { border: 1.5px solid #1A1A1A; border-radius: 99px; padding: 6px 18px; font-size: 13px; color: #1A1A1A; text-decoration: none; font-weight: 500; }
.nav-btn:hover { background: #1A1A1A; color: #fff; }

.contact-wrap {
  flex: 1;
  max-width: 560px; margin: 0 auto;
  padding: 120px 32px 80px;
  display: flex; flex-direction: column; justify-content: center;
}
.contact-wrap h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 10px; }
.lead { font-size: 14px; color: #666; margin-bottom: 48px; }

.type-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 36px; }
.type-card {
  border: 1.5px solid #DDD8D0; border-radius: 12px;
  padding: 18px 16px; cursor: pointer; background: #fff;
  transition: border-color 0.15s, background 0.15s;
}
.type-card:hover { border-color: #1D9E75; }
.type-card.selected { border-color: #1D9E75; background: #E8F5EF; }
.type-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.type-card p { font-size: 11px; color: #888; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 7px; color: #444; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; border: 1.5px solid #DDD8D0; border-radius: 9px;
  padding: 11px 14px; font-size: 14px; font-family: inherit;
  color: #1A1A1A; background: #fff; outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #1D9E75; }
.form-group textarea { height: 100px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.submit-btn {
  width: 100%; background: #1A1A1A; color: #fff; border: none;
  border-radius: 99px; padding: 15px; font-size: 14px; font-weight: 700;
  font-family: inherit; cursor: pointer; margin-top: 4px;
  transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.8; }
.note { font-size: 11px; color: #999; margin-top: 14px; text-align: center; line-height: 1.7; }

footer { background: #EDE8DF; border-top: 1px solid #DDD8D0; padding: 28px 32px; display: flex; justify-content: space-between; align-items: center; }
.footer-logo { font-size: 15px; font-weight: 700; color: #1A1A1A; text-decoration: none; }
.footer-copy { font-size: 12px; color: #888; }

@media (max-width: 768px) {
  .contact-wrap { padding: 90px 20px 64px; }
  .type-select { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  footer { flex-direction: column; gap: 8px; text-align: center; }
}
</style>
</head>
<body>
<header class="site-header">
  <a href="index.html" class="site-title">nurselink</a>
  <nav class="nav-links">
    <a href="features.html">機能</a>
    <a href="contact.html" class="active">お問い合わせ</a>
    <a href="contact.html" class="nav-btn">デモ予約</a>
  </nav>
</header>

<div class="contact-wrap">
  <h1>お問い合わせ</h1>
  <p class="lead">導入のご相談・デモのご予約はこちらから。お気軽にご連絡ください。</p>

  <div class="type-select">
    <div class="type-card selected" onclick="selectType(this)">
      <h3>デモを予約する</h3>
      <p>実際の画面をご覧いただきながらご説明します</p>
    </div>
    <div class="type-card" onclick="selectType(this)">
      <h3>パイロット導入を相談する</h3>
      <p>試験導入について詳しくご相談いただけます</p>
    </div>
  </div>

  <form id="contactForm">
    <div class="form-row">
      <div class="form-group">
        <label>お名前 <span style="color:#E24B4A">*</span></label>
        <input type="text" id="name" placeholder="山田 花子" required>
      </div>
      <div class="form-group">
        <label>病院・施設名</label>
        <input type="text" id="facility" placeholder="○○病院">
      </div>
    </div>
    <div class="form-group">
      <label>メールアドレス <span style="color:#E24B4A">*</span></label>
      <input type="email" id="email" placeholder="hanako@example.com" required>
    </div>
    <div class="form-group">
      <label>ご職種</label>
      <select>
        <option value="">選択してください</option>
        <option>看護師長・主任</option>
        <option>看護師・スタッフ</option>
        <option>病院管理者・事務長</option>
        <option>その他</option>
      </select>
    </div>
    <div class="form-group">
      <label>ご質問・ご要望</label>
      <textarea id="message" placeholder="ご自由にご記入ください"></textarea>
    </div>
    <button type="submit" class="submit-btn">送信する</button>
    <p class="note">送信後、2営業日以内にご連絡いたします。</p>
  </form>
</div>

<footer>
  <a href="index.html" class="footer-logo">nurselink</a>
  <span class="footer-copy">© 2026 Nurselink</span>
</footer>

<script>
function selectType(el) {
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const type = document.querySelector('.type-card.selected h3')?.textContent || '';
  const name = document.getElementById('name').value;
  const facility = document.getElementById('facility').value;
  const email = document.getElementById('email').value;
  const message = document.getElementById('message').value;

  const subject = encodeURIComponent('【Nurselink】' + type);
  const body = encodeURIComponent(
    'お名前：' + name + '\n' +
    '病院・施設名：' + facility + '\n' +
    '返信用メール：' + email + '\n\n' +
    'ご質問・ご要望：\n' + message
  );

  window.location.href = 'mailto:info@trynurselink.com?subject=' + subject + '&body=' + body;
});
</script>
</body>
</html>
